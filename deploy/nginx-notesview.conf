# nginx config for notesview on siplgo.xyz
# HTTPS via Let's Encrypt, /api proxy to clone-server on port 5181
# Steps:
#   1. Deploy with HTTP-only first
#   2. Wait for DNS to propagate
#   3. Run: sudo bash /tmp/deploy-notesview/deploy/setup-ssl.sh
#   4. Subsequent deploys will use this HTTPS config

server {
    listen 80;
    server_name siplgo.xyz www.siplgo.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name siplgo.xyz www.siplgo.xyz;

    # SSL — Let's Encrypt (set up by setup-ssl.sh)
    ssl_certificate     /etc/letsencrypt/live/siplgo.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/siplgo.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/markdown;

    # API proxy → clone-server
    location /api/ {
        proxy_pass http://localhost:5181;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SSE endpoint — longer timeout
    location /api/clone {
        proxy_pass http://localhost:5181;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
