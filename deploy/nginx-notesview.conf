# nginx config for notesview on siplgo.xyz
# HTTP + optional HTTPS (certbot will add SSL via --nginx plugin)

# ACME challenge block (shared)
map $http_host $acme_challenge_dir {
    default                   /usr/share/nginx/html;
    "~^siplgo\."              /usr/share/nginx/html;
}

server {
    listen 80;
    listen [::]:80;
    server_name siplgo.xyz www.siplgo.xyz;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/markdown;

    # Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        default_type text/plain;
    }

    # API proxy → clone-server
    location /api/ {
        proxy_pass http://localhost:5181;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SSE endpoint
    location /api/clone {
        proxy_pass http://localhost:5181;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
