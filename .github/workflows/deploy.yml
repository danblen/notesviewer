name: Deploy to GitHub Pages & EC2

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build for GitHub Pages
        run: |
          sed -i "s|base: '/|base: '/notesviewer/|" vite.config.js
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-ec2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Prepare EC2 directories
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 44.194.211.249
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -rf /tmp/deploy-notesview
            mkdir -p /tmp/deploy-notesview

      - name: Upload to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 44.194.211.249
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*,server/clone-server.cjs,deploy/*"
          target: /tmp/deploy-notesview
          strip_components: 0

      - name: Deploy frontend, backend & setup HTTPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 44.194.211.249
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Deploy frontend
            sudo rm -rf /usr/share/nginx/html/*
            sudo cp -r /tmp/deploy-notesview/dist/* /usr/share/nginx/html/

            # Deploy backend
            sudo cp /tmp/deploy-notesview/server/clone-server.cjs /opt/notesview/
            sudo systemctl restart notesview

            # Setup nginx config & SSL (idempotent — safe to re-run)
            sudo bash /tmp/deploy-notesview/deploy/setup-ssl.sh

            # Cleanup
            rm -rf /tmp/deploy-notesview
